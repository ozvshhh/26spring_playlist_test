<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Awesom MixTape 2</title>
    <script defer src="./script.js"></script>
</head>
<body>
    <audio class="music" src="" controls style="display:none"></audio>
    <main class="container">
        <section class="playlist-board">
            <header class="board-header">
                <div class="Mixtape2"></div>
                <div class="cat-sticker"></div>
            </header>
            <section class="now-playing">
                <section class="tape-set">
                    <article class="track-cassette">
                        <img src="./source/cassete5.png"/>
                    </article>
                    <article class="track-card">
                        <img src="./source/track_card.png"></img>
                        <div class="text-box">
                            <p class="song"></p>
                            <p class="artist"></p>
                        </div>
                    </article>
                </section>
            </section>
            <section class="cassette-strip">
                <ul class="cassette-list">
                    <li class="cassette-item">
                        <img src="./source/cassete1.png"/>
                    </li>
                    <li class="cassette-item">
                        <img src="./source/cassete2.png"/>
                    </li>
                    <li class="cassette-item">
                        <img src="./source/cassete3.png"/>
                    </li>
                    <li class="cassette-item">
                        <img src="./source/cassete4.png"/>
                    </li>
                    <li class="cassette-item">
                        <img src="./source/cassete6.png"/>
                    </li>
                </ul>
            </section>
        </section>
    </main>
</body>
</html>
